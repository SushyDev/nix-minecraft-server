name: docker-image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//\-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
        with:
          extra-conf: |
            system-features = nixos-test benchmark big-parallel kvm
            flakehub-cache-server = ""

      - name: Set up Nix cache
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      - name: Build Docker image with Nix
        run: |
          nix build .#packages.${{ matrix.platform == 'linux/amd64' && 'x86_64-linux' || 'aarch64-linux' }}.docker
          mkdir -p /tmp/digests
          IMAGE_PATH=$(readlink -f result)
          echo "IMAGE_PATH=$IMAGE_PATH" >> $GITHUB_ENV

      - name: Load and push image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          # Load the image into Docker
          docker load < $IMAGE_PATH
          
          # Log in to registry
          echo ${{ secrets.GITHUB_TOKEN }} | docker login -u ${{ github.repository_owner }} --password-stdin $REGISTRY
          
          # Tag the image with registry/name and platform
          docker tag nix-minecraft-server:latest $REGISTRY/$IMAGE_NAME:latest-${{ env.PLATFORM_PAIR }}
          
          # Push the image
          docker push $REGISTRY/$IMAGE_NAME:latest-${{ env.PLATFORM_PAIR }}

      - name: Save image digest
        run: |
          mkdir -p /tmp/digests
          # Save the platform pair as filename for the merge job to use
          echo "${{ env.PLATFORM_PAIR }}" > "/tmp/digests/${{ env.PLATFORM_PAIR }}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-%s ' *)
